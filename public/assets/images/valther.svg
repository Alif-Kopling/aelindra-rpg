<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128" style="image-rendering: pixelated; shape-rendering: crispEdges;">
  <!-- Background: Sinister Dark Red & Charcoal Gradient in 64-bit Pixel Blocks -->
  <rect width="64" height="64" fill="#0b0101" />
  <rect x="2" y="2" width="60" height="60" fill="#1b0303" />
  <rect x="4" y="4" width="56" height="56" fill="#0f0202" />

  <!-- Pixelated Magic Aura/Fog in BG -->
  <path d="M 6,48 H 10 V 52 H 6 Z M 54,44 H 58 V 48 H 54 Z" fill="#3a0404" />
  <path d="M 12,12 H 14 V 14 H 12 Z M 50,16 H 52 V 18 H 50 Z" fill="#3a0404" />
  <rect x="8" y="24" width="2" height="2" fill="#5c0707" />
  <rect x="52" y="28" width="2" height="2" fill="#5c0707" />
  <rect x="20" y="6" width="3" height="1" fill="#3a0404" />
  <rect x="42" y="8" width="3" height="1" fill="#3a0404" />

  <!-- Character Group Shadow -->
  <path d="M 12,50 Q 32,46 52,50 L 56,60 H 8 Z" fill="#050001" opacity="0.5" />

  <!-- Back Hair (Deep Charcoal Shadow) -->
  <path d="M 16,22 H 48 V 44 H 16 Z" fill="#0c0c0e" />
  <path d="M 14,26 H 50 V 40 H 14 Z" fill="#0c0c0e" />
  <path d="M 12,30 H 52 V 36 H 12 Z" fill="#050506" />

  <!-- Sinister High Collar (Backpiece) -->
  <!-- Outer Dark Burgundy Collar -->
  <path d="M 14,42 L 8,30 L 16,36 L 22,44 Z" fill="#3d030f" />
  <path d="M 50,42 L 56,30 L 48,36 L 42,44 Z" fill="#3d030f" />
  <!-- Shadow of Collar -->
  <path d="M 14,43 L 9,32 L 15,37 Z" fill="#200107" />
  <path d="M 50,43 L 55,32 L 49,37 Z" fill="#200107" />

  <!-- Neck -->
  <rect x="27" y="42" width="10" height="8" fill="#d8baa7" />
  <rect x="25" y="45" width="14" height="5" fill="#c3a08b" />
  <!-- Neck Shadow -->
  <rect x="27" y="42" width="10" height="2" fill="#ab8874" />

  <!-- Face Base (Pale Villainous Skin Tone) -->
  <path d="M 19,22 H 45 V 42 H 19 Z" fill="#fceae0" />
  <path d="M 21,20 H 43 V 44 H 21 Z" fill="#fceae0" />
  <path d="M 23,18 H 41 V 45 H 23 Z" fill="#fceae0" />
  
  <!-- Face Shadowing & Details (Jawline & Cheekbones) -->
  <path d="M 19,30 H 22 V 42 H 19 Z" fill="#ebd1c2" />
  <path d="M 42,30 H 45 V 42 H 42 Z" fill="#ebd1c2" />
  <rect x="22" y="40" width="20" height="4" fill="#dcb39e" />
  <rect x="24" y="43" width="16" height="2" fill="#cfa189" />
  <rect x="20" y="32" width="4" height="6" fill="#ebd1c2" opacity="0.6" />
  <rect x="40" y="32" width="4" height="6" fill="#ebd1c2" opacity="0.6" />

  <!-- Slick Sharp Black Hair with Detailed Silver/Grey Highlights -->
  <!-- Base Dark Hair Structure -->
  <path d="M 18,17 H 46 V 25 H 18 Z" fill="#18181c" />
  <path d="M 21,15 H 43 V 18 H 21 Z" fill="#18181c" />
  <path d="M 24,13 H 40 V 16 H 24 Z" fill="#18181c" />
  <!-- Bangs and strands framing face -->
  <rect x="17" y="19" width="3" height="8" fill="#18181c" />
  <rect x="44" y="19" width="3" height="8" fill="#18181c" />
  <rect x="19" y="24" width="2" height="6" fill="#18181c" />
  <rect x="43" y="24" width="2" height="6" fill="#18181c" />
  <rect x="21" y="27" width="1" height="4" fill="#18181c" />
  <rect x="42" y="27" width="1" height="4" fill="#18181c" />
  <!-- Center widows peak strand -->
  <path d="M 30,17 H 34 V 24 L 32,27 L 30,24 Z" fill="#18181c" />
  <path d="M 28,17 H 30 V 21 L 29,23 Z" fill="#18181c" />
  <path d="M 34,17 H 36 V 21 L 35,23 Z" fill="#18181c" />

  <!-- Silver Streaks / Shading (Finer 64-bit Pixel strands) -->
  <path d="M 22,16 H 28 V 17 H 22 Z" fill="#a0a0ab" />
  <path d="M 36,16 H 42 V 17 H 36 Z" fill="#a0a0ab" />
  <path d="M 25,14 H 39 V 15 H 25 Z" fill="#7a7a85" />
  <path d="M 26,15 H 38 V 16 H 26 Z" fill="#a0a0ab" />
  <!-- Brighter Silver strands -->
  <rect x="23" y="17" width="3" height="1" fill="#d2d2db" />
  <rect x="38" y="17" width="3" height="1" fill="#d2d2db" />
  <rect x="20" y="20" width="1" height="3" fill="#a0a0ab" />
  <rect x="43" y="20" width="1" height="3" fill="#a0a0ab" />
  <rect x="31" y="18" width="2" height="3" fill="#a0a0ab" />

  <!-- Sinister Sharp Angled Eyebrows -->
  <path d="M 22,25 L 30,27 V 26 L 23,24 Z" fill="#000000" />
  <path d="M 42,25 L 34,27 V 26 L 41,24 Z" fill="#000000" />
  <!-- Brow shadow -->
  <rect x="23" y="26" width="6" height="1" fill="#4d242c" opacity="0.5" />
  <rect x="35" y="26" width="6" height="1" fill="#4d242c" opacity="0.5" />

  <!-- Evil Glowing Red Eyes (64-bit detail) -->
  <!-- Sclera -->
  <rect x="23" y="28" width="6" height="4" fill="#ffffff" />
  <rect x="35" y="28" width="6" height="4" fill="#ffffff" />
  <!-- Glowing Crimson Red Iris -->
  <rect x="24" y="28" width="4" height="4" fill="#e60026" />
  <rect x="36" y="28" width="4" height="4" fill="#e60026" />
  <!-- Glowing pupil center (light red/white) -->
  <rect x="26" y="29" width="2" height="2" fill="#ff8093" />
  <rect x="36" y="29" width="2" height="2" fill="#ff8093" />
  <rect x="27" y="29" width="1" height="1" fill="#ffffff" />
  <rect x="37" y="29" width="1" height="1" fill="#ffffff" />
  <!-- Evil eye shadow / dark eyeliner -->
  <rect x="22" y="27" width="8" height="1" fill="#0e0104" />
  <rect x="34" y="27" width="8" height="1" fill="#0e0104" />
  <rect x="23" y="32" width="6" height="1" fill="#913345" />
  <rect x="35" y="32" width="6" height="1" fill="#913345" />

  <!-- Sharp Villainous Nose with Shadow -->
  <path d="M 31,30 H 33 V 37 L 31,37 Z" fill="#dcb39e" />
  <path d="M 32,34 H 34 V 37 H 32 Z" fill="#baa090" opacity="0.5" />
  <rect x="32" y="36" width="2" height="1" fill="#9a715d" />

  <!-- Sinister Smirking Mouth (Higher detail tilted smirk) -->
  <!-- Smirk Outline -->
  <path d="M 27,39 Q 32,42 36,38 L 37,36" fill="none" stroke="#4a000e" stroke-width="1.5" />
  <rect x="37" y="36" width="1" height="1" fill="#4a000e" />
  <!-- Under lip shadow -->
  <rect x="28" y="41" width="7" height="1" fill="#cfa189" />

  <!-- Elegant Dark Crimson and Gold Royal Robe (64-bit Grid) -->
  <!-- Robe Base Structure -->
  <path d="M 12,50 Q 32,46 52,50 L 58,64 H 6 Z" fill="#30030e" />
  
  <!-- Outer Gold Epaulets / Ornate Shoulders -->
  <path d="M 8,50 H 16 V 64 H 6 Q 6,56 8,50 Z" fill="#cca43b" />
  <path d="M 48,50 H 56 Q 58,56 58,64 H 48 Z" fill="#cca43b" />
  <!-- Shiny Gold Highlights -->
  <path d="M 9,49 H 14 V 51 H 9 Z" fill="#ffea7a" />
  <path d="M 50,49 H 55 V 51 H 50 Z" fill="#ffea7a" />
  <!-- Epaulet Shadow details -->
  <path d="M 7,53 H 11 V 64 H 7 Z" fill="#9c720a" />
  <path d="M 53,53 H 57 V 64 H 53 Z" fill="#9c720a" />

  <!-- Crimson Inner Vest/Coat -->
  <path d="M 20,48 H 44 V 64 H 20 Z" fill="#690415" />
  <path d="M 23,48 H 41 V 64 H 23 Z" fill="#8f0b22" />

  <!-- Elegant Gold Center Embroidery and Gems -->
  <rect x="31" y="48" width="2" height="16" fill="#cca43b" />
  <rect x="30" y="49" width="4" height="2" fill="#ffe28a" />
  <!-- Central Magical Ruby Gem on chest -->
  <rect x="30" y="53" width="4" height="4" fill="#cca43b" />
  <rect x="31" y="54" width="2" height="2" fill="#ff0033" />
  <rect x="31" y="54" width="1" height="1" fill="#ff8093" />
  
  <rect x="30" y="59" width="4" height="2" fill="#ffe28a" />

  <!-- Shadow below chin and collar -->
  <path d="M 18,47 H 46 V 49 H 18 Z" fill="#170106" />
</svg>
